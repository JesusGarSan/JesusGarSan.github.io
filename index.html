<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Variable global para saber qué idioma estamos usando
    let idiomaActual = 'es';

    async function cambiarIdioma(nuevoIdioma) {
        if (nuevoIdioma === idiomaActual) return;
        
        // Antes de cargar los nuevos contenidos en cambiarIdioma
        const modalesAntiguos = document.querySelectorAll('.portfolio-modal');
        modalesAntiguos.forEach(m => m.remove());
        try {
            const response = await fetch('assets/text.json');
            const traducciones = await response.json();
            const textos = traducciones[nuevoIdioma];

            // ... (tus líneas de localStorage y URL) ...

            // 3. Traducir elementos estáticos
            document.querySelectorAll('[data-key]').forEach(elemento => {
                const clave = elemento.getAttribute('data-key');
                const textoTraducido = clave.split('.').reduce((obj, i) => obj[i], textos);
                if (textoTraducido) elemento.innerHTML = textoTraducido;
            });

            // 4. Actualizar botones
            actualizarBotonesIdioma(nuevoIdioma);

            // 5. IMPORTANTE: Cargar publicaciones y proyectos
            // Pasamos "textos" que contiene el diccionario del idioma seleccionado
            inicializarContenidosDinamicos(textos); 

            idiomaActual = nuevoIdioma;
            document.documentElement.lang = nuevoIdioma;

        } catch (error) {
            console.error("Error al cambiar el idioma:", error);
        }
    }


        const mesesMap = {
            'jan': { val: 0, es: 'Enero', en: 'January' },
            'feb': { val: 1, es: 'Febrero', en: 'February' },
            'mar': { val: 2, es: 'Marzo', en: 'March' },
            'apr': { val: 3, es: 'Abril', en: 'April' },
            'may': { val: 4, es: 'Mayo', en: 'May' },
            'jun': { val: 5, es: 'Junio', en: 'June' },
            'jul': { val: 6, es: 'Julio', en: 'July' },
            'aug': { val: 7, es: 'Agosto', en: 'August' },
            'sep': { val: 8, es: 'Septiembre', en: 'September' },
            'oct': { val: 9, es: 'Octubre', en: 'October' },
            'nov': { val: 10, es: 'Noviembre', en: 'November' },
            'dec': { val: 11, es: 'Diciembre', en: 'December' }
        };

    function parseBibtexByTag(text, tagToFilter) {
        const entries = [];
        const blocks = text.split(/@/i).slice(1);
        
        blocks.forEach(block => {
            if (block.toLowerCase().startsWith(tagToFilter.toLowerCase())) {
                const entry = {};
                
                // Title
                const titleMatch = block.match(/title\s*=\s*\{(.+?)\}/is);
                if (titleMatch) entry.title = titleMatch[1].replace(/\s+/g, ' ').replace(/[\{\}]/g, '');
                
                // Author
                const authorMatch = block.match(/author\s*=\s*\{(.+?)\}/is);
                if (authorMatch) entry.author = authorMatch[1].replace(/\s+/g, ' ');
                
                // Source
                const sourceMatch = block.match(/(journal|booktitle)\s*=\s*\{(.+?)\}/is);
                if (sourceMatch) entry.source = sourceMatch[2];
                
                // Year
                const yearMatch = block.match(/year\s*=\s*\{?(\d{4})\}?/i);
                if (yearMatch) entry.year = parseInt(yearMatch[1]);
                
                // Month
                const monthMatch = block.match(/month\s*=\s*\{?(\w+)\}?/i);
                if (monthMatch) {
                    const mesKey = monthMatch[1].toLowerCase().substring(0, 3);
                    if (typeof mesesMap !== 'undefined' && mesesMap[mesKey]) {
                        entry.monthVal = mesesMap[mesKey].val;
                        // Use idiomaActual to select the language
                        entry.monthName = mesesMap[mesKey][idiomaActual] || mesesMap[mesKey].es;
                    }
                }
                
                // URL
                const urlMatch = block.match(/url\s*=\s*\{(.+?)\}/i);
                if (urlMatch) entry.url = urlMatch[1];

                // --- THE FIX FOR THE NOTE FIELD ---
                // Grabs the content inside note={...}
                const noteMatch = block.match(/note\s*=\s*\{(.+?)\}/i);
                // If it exists, use it; otherwise, use an empty string (prevents "undefined")
                entry.note = noteMatch ? noteMatch[1] : ""; 
                
                if (entry.title) entries.push(entry);
            }
        });
        return entries;
    }

    function inicializarContenidosDinamicos(langData) {
        // Cargar Publicaciones
        fetch('assets/publicaciones.bib')
            .then(response => response.text())
            .then(text => {
                renderizarLista(parseBibtexByTag(text, 'article'), 'contenedor-articulos', langData.sections.no_records);
                renderizarLista(parseBibtexByTag(text, 'inproceedings'), 'contenedor-congresos', langData.sections.no_records);
            });

        // Cargar Proyectos y Divulgación
        cargarSeccionInfinita('assets/premios.json', 'contenedor-premios', 'proyectoModalDiv');
        cargarSeccionInfinita('assets/proyectos.json', 'contenedor-proyectos', 'proyectoModalDiv');
        cargarSeccionInfinita('assets/divulgacion.json', 'contenedor-divulgacion', 'divulgacionModalDiv');
    }

function renderizarLista(pubs, contenedorId, noRecordsText) {
    const contenedor = document.getElementById(contenedorId);
    pubs.sort((a, b) => (b.year !== a.year) ? b.year - a.year : (b.monthVal || 0) - (a.monthVal || 0));
    contenedor.innerHTML = pubs.length > 0 ? '' : `<p class="text-muted p-3">${noRecordsText}</p>`;
    
    pubs.forEach(pub => {
        let authors = pub.author ? pub.author.replace(/ and /g, ', ') : "";
        const fecha = pub.monthName ? `${pub.monthName} ${pub.year}` : pub.year;
        
        let noteDisplay = "";
        let iconClass = "fas fa-info-circle"; 

        if (pub.note) {
            // Capitalize only first letter (e.g., "Chair", "Poster")
            noteDisplay = pub.note.charAt(0).toUpperCase() + pub.note.slice(1).toLowerCase();
            
            const lowNote = pub.note.toLowerCase();
            if (lowNote.includes('poster')) {
                iconClass = "fas fa-chalkboard";
            } else if (lowNote.includes('chair')) {
                iconClass = "fas fa-chair"; // Proper favicon for Session Chair
            } else if (lowNote.includes('oral') || lowNote.includes('presentation')) {
                iconClass = "fas fa-microphone-alt";
            } else if (lowNote.includes('invited')) {
                iconClass = "fas fa-star";
            }
        }

        contenedor.innerHTML += `
            <div class="pub-item mb-3">
                <a href="${pub.url || '#'}" target="_blank" class="pub-title d-block mb-1">${pub.title}</a>
                <div class="pub-authors" style="font-size: 0.85rem;">${authors}</div>
                <div class="pub-meta" style="font-size: 0.85rem;">
                    <i class="fas fa-bookmark me-1"></i> ${pub.source || 'Publicación'} | 
                    <i class="fas fa-calendar-alt me-1"></i> ${fecha}
                    ${pub.note ? ` | <span class="pub-note"><i class="${iconClass} me-1"></i> ${noteDisplay}</span>` : ''}
                </div>
            </div>`;
    });
}

function cargarSeccionInfinita(url, contenedorId, modalPrefix) {
    fetch(url)
        .then(response => response.json())
        .then(data => {
            const contenedorCards = document.getElementById(contenedorId);
            // Limpiamos el contenedor para evitar duplicados al cambiar idioma
            contenedorCards.innerHTML = ""; 
            
            data.sort((a, b) => b.id - a.id); 

            data.forEach(item => {
                // Selección dinámica de textos según el idioma actual
                const titulo = item[`titulo_${idiomaActual}`] || item.titulo_es || item.titulo;
                const descripcion = item[`descripcion_${idiomaActual}`] || item.descripcion_es || item.descripcion;

                // 1. Renderizado de la Card (Miniatura)
                contenedorCards.innerHTML += `
                    <div class="col-md-6 col-lg-4 mb-5">
                        <div class="portfolio-item mx-auto" data-bs-toggle="modal" data-bs-target="#${modalPrefix}${item.id}">
                            <div class="portfolio-item-caption d-flex align-items-center justify-content-center h-100 w-100">
                                <div class="portfolio-item-caption-content text-center text-white"><i class="fas fa-plus fa-3x"></i></div>
                            </div>
                            <img class="img-fluid" src="${item.imagen_card}" alt="${titulo}" />
                        </div>
                    </div>`;

                // 2. Lógica de Multimedia (YouTube o Imagen)
                let multimediaHTML = '';
                if (item.youtube_id && item.youtube_id !== "") {
                    multimediaHTML = `
                        <div class="ratio ratio-16x9 mb-5">
                            <iframe src="https://www.youtube.com/embed/${item.youtube_id}" title="YouTube video" allowfullscreen></iframe>
                        </div>`;
                } else if (item.imagen_modal && item.imagen_modal !== "") {
                    multimediaHTML = `<img class="img-fluid rounded mb-5" src="${item.imagen_modal}" alt="${titulo}" />`;
                }

                // 3. Renderizado del Modal (Detalle)
                const modal = `
                    <div class="portfolio-modal modal fade" id="${modalPrefix}${item.id}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-xl">
                            <div class="modal-content">
                                <div class="modal-header border-0">
                                    <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body text-center pb-5">
                                    <div class="container">
                                        <div class="row justify-content-center">
                                            <div class="col-lg-8">
                                                <h2 class="portfolio-modal-title text-secondary text-uppercase mb-0">${titulo}</h2>
                                                <div class="divider-custom"></div>
                                                ${multimediaHTML}
                                                <p class="mb-4 text-start">${descripcion}</p>
                                                <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                                                    <i class="fas fa-external-link-alt fa-fw"></i> 
                                                    ${idiomaActual === 'es' ? 'Más información' : 'More information'}
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                document.body.insertAdjacentHTML('beforeend', modal);
            });
        });
}

    // 1. Nueva función auxiliar para iluminar el botón correcto
    function actualizarBotonesIdioma(lang) {
        document.querySelectorAll('.lang-switch').forEach(btn => {
            // Compara el atributo data-lang del span con el idioma activo
            btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
    }

    // 2. Inicio de la aplicación (Sustituye todo lo anterior por esto)
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const langUrl = urlParams.get('lang');
        const langStorage = localStorage.getItem('idiomaPreferido');
        
        // Prioridad: URL > Storage > Español por defecto
        const idiomaFinal = langUrl || langStorage || 'es';

        // Forzamos la carga inicial vaciando la variable de control
        idiomaActual = ''; 
        cambiarIdioma(idiomaFinal);
    });
</script>
